[pytest]
# Discover tests only in the tests/ directory
testpaths = tests

# Show verbose output and short traceback by default
addopts = -v --tb=short

# Custom markers — prevents PytestUnknownMarkWarning and documents test pillars
markers =
    integrity:  "Pillar A — DB constraint and negative tests (CHECK, FK, ENUM, UNIQUE)"
    workflow:   "Pillar B — End-to-end business workflow and state-transition tests"
    cli:        "Pillar C — CLI subprocess I/O automation tests"
